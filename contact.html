<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Nayan Talekar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
      color: #2c3e50;
      min-height: 100vh;
      padding: 40px 20px;
    }
    .container {
      max-width: 800px;
      margin: 0 auto;
      text-align: center;
    }
    h1 {
      font-size: 3.5em;
      margin-bottom: 30px;
    }
    .back-link {
      display: inline-block;
      color: #2c3e50;
      text-decoration: none;
      padding: 12px 25px;
      border: 2px solid #2c3e50;
      border-radius: 30px;
      margin-bottom: 40px;
      transition: all 0.3s ease;
      background: rgba(255,255,255,0.8);
    }
    .back-link:hover {
      background: #2c3e50;
      color: #fff;
    }
    .contact-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 30px;
      margin-bottom: 40px;
    }
    .contact-item {
      background: rgba(255,255,255,0.9);
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
      transition: transform 0.3s ease;
    }
    .contact-item:hover {
      transform: translateY(-5px);
    }
    .contact-item h3 {
      color: #e74c3c;
      margin-bottom: 15px;
      font-size: 1.4em;
    }
    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      padding: 15px;
      border: 2px solid #e1e1e1;
      border-radius: 10px;
      font-size: 1em;
      transition: border-color 0.3s ease;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      outline: none;
      border-color: #3498db;
    }
    button {
      background: #3498db;
      color: white;
      padding: 15px 40px;
      border: none;
      border-radius: 30px;
      font-size: 1.1em;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    button:hover {
      background: #2980b9;
      transform: translateY(-2px);
    }
    @media (max-width: 768px) {
      .contact-grid { grid-template-columns: 1fr; }
      h1 { font-size: 2.5em; }
    }
  </style
