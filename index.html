<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nayan Talekar</title>
  <style>
    /* Reset default margins */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(to right, #4cafb1, #2c3e50);
      color: #fff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
    }

    h1 {
      font-size: 4em;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    nav {
      margin-top: 30px;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 1.2em;
      margin: 0 20px;
      padding: 10px 20px;
      border: 2px solid #fff;
      border-radius: 5px;
      transition: 0.3s;
    }

    nav a:hover {
      background: #fff;
      color: #2c3e50;
      transform: scale(1.05);
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2.5em;
      }
      nav a {
        display: block;
        margin: 10px 0;
      }
    }
  </style>
