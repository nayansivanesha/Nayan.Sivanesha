<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nayan Talekar - Student</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
      padding: 20px;
    }
    .intro {
      max-width: 800px;
    }
    h1 {
      font-size: 4.5em;
      letter-spacing: 3px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    .subtitle {
      font-size: 1.5em;
      margin-bottom: 20px;
      opacity: 0.9;
      font-weight: 300;
    }
    .profession {
      font-size: 1.8em;
      background: rgba(255,255,255,0.2);
      padding: 15px 30px;
      border-radius: 50px;
      margin-bottom: 40px;
      backdrop-filter: blur(10px);
    }
    nav {
      margin-top: 40px;
    }
    nav a {
      color: #fff;
      text-decoration: none;
      font-size: 1.2em;
      margin: 0 15px;
      padding: 12px 25px;
      border: 2px solid rgba(255,255,255,0.8);
      border-radius: 30px;
      transition: all 0.3s ease;
      display: inline-block;
    }
    nav a:hover {
      background: rgba(255,255,255,0.9);
      color: #667eea;
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    @media (max-width: 768px) {
      h1 { font-size: 3em; }
      .profession { font-size: 1.4em; padding: 12px 25px; }
      nav a { 
        display: block;
        margin: 12px 0;
        max-width: 250px;
        margin-left: auto;
        margin-right: auto;
      }
    }
  </style>
</head>
<body>
  <div class="intro">
    <h1>Nayan Sivanesha</h1>
    <p class="subtitle">(Officially Nayan Talekar)</p>
    <div class="profession">Student</div>
    
    <nav>
      <a href="about.html">About</a>
      <a href="blogs.html">Blogs</a>
      <a href="vision.html">Vision</a>
      <a href="contact.html">Contact</a>
    </nav>
  </div>
</body>
</html>
